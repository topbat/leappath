  <!-- Suggestion 1 -->
  <rect x="326" y="520" width="804" height="56" rx="8" fill="#FFFFFF" stroke="#FEE2E2" stroke-width="1"/>
  <rect x="336" y="532" width="32" height="32" rx="8" fill="#FEF2F2"/>
  <text x="344" y="553" font-size="16">🔴</text>
  <text x="378" y="545" font-size="13" font-weight="600" fill="#141B2B">项目描述缺少量化数据</text>
  <text x="378" y="563" font-size="11" fill="#6B7280">建议：将"提升了系统性能"改为"QPS 从 2000 提升至 8000，响应时间降低 60%"</text>
  <rect x="1030" y="532" width="80" height="28" rx="6" fill="#1A56DB"/>
  <text x="1048" y="551" font-size="10" fill="#fff">采纳优化</text>

  <!-- Suggestion 2 -->
  <rect x="326" y="584" width="804" height="56" rx="8" fill="#FFFFFF" stroke="#FEF3C7" stroke-width="1"/>
  <rect x="336" y="596" width="32" height="32" rx="8" fill="#FFFBEB"/>
  <text x="344" y="617" font-size="16">🟡</text>
  <text x="378" y="609" font-size="13" font-weight="600" fill="#141B2B">技能标签可以更精准</text>
  <text x="378" y="627" font-size="11" fill="#6B7280">建议：补充"Docker Compose"、"Jenkins"、"Prometheus"等热门 DevOps 关键词</text>
  <rect x="1030" y="596" width="80" height="28" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/>
  <text x="1048" y="615" font-size="10" fill="#6B7280">采纳优化</text>

  <!-- Suggestion 3 -->
  <rect x="326" y="648" width="804" height="56" rx="8" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="1"/>
  <rect x="336" y="660" width="32" height="32" rx="8" fill="#ECFDF5"/>
  <text x="344" y="681" font-size="16">🟢</text>
  <text x="378" y="673" font-size="13" font-weight="600" fill="#141B2B">自我评价写得不错</text>
  <text x="378" y="691" font-size="11" fill="#6B7280">STAR 结构完整，建议再补充一个具体项目成果佐证</text>
  <rect x="1030" y="660" width="80" height="28" rx="6" fill="#F0FDF4" stroke="#D1FAE5"/>
  <text x="1048" y="679" font-size="10" fill="#16A34A">已达标 ✓</text>

