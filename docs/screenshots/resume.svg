<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter,'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0F4FF"/><stop offset="100%" stop-color="#E8EDFB"/></linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1A56DB"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/></filter>
    <filter id="shadow-sm"><feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.06"/></filter>
