  <text x="346" y="580" font-size="12" fill="#141B2B">一面问了算法题和项目经验，二面系统设计，三面 HR。整体偏难但公平。</text>
  <text x="346" y="600" font-size="11" fill="#6B7280">高频问题: MySQL 索引原理 · 秒杀系统设计 · Redis 持久化</text>
  <rect x="1010" y="536" width="60" height="20" rx="4" fill="#D1FAE5"/>
