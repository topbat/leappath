  <text x="760" y="290" font-size="11" fill="#9CA3AF">企业文化</text>
  <rect x="760" y="298" width="48" height="22" rx="4" fill="#FEF3C7"/>
  <text x="768" y="313" font-size="10" fill="#D9770B">大小周</text>
  <rect x="816" y="298" width="40" height="22" rx="4" fill="#F0FDF4"/>
