  <text x="1010" y="600" font-size="10" fill="#9CA3AF">来源: 牛客</text>

  <!-- Review 2 -->
  <rect x="326" y="630" width="804" height="100" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="346" y="646" width="60" height="20" rx="4" fill="#DBEAFE"/>
  <text x="352" y="661" font-size="9" font-weight="600" fill="#2563EB">Go 开发</text>
  <rect x="414" y="646" width="40" height="20" rx="4" fill="#FEF3C7"/>
  <text x="420" y="661" font-size="9" fill="#D9770B">4轮</text>
  <rect x="462" y="646" width="60" height="20" rx="4" fill="#FEE2E2"/>
  <text x="470" y="661" font-size="9" fill="#DC2626">难度: 5/5</text>

  <text x="346" y="690" font-size="12" fill="#141B2B">技术面考察很深，系统设计环节要求画架构图并讲解权衡取舍。</text>
  <text x="346" y="710" font-size="11" fill="#6B7280">高频问题: 分布式一致性 · 微服务拆分 · 性能调优实战</text>
