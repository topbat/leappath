  <!-- Interview Reviews Section -->
  <rect x="296" y="450" width="864" height="320" rx="14" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="326" y="484" font-size="16" font-weight="600" fill="#141B2B">💬 面经聚合 · 腾讯科技</text>
  <text x="326" y="504" font-size="12" fill="#9CA3AF">来自牛客、脉脉等平台的真实面经</text>

  <!-- Review 1 -->
  <rect x="326" y="520" width="804" height="100" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <rect x="346" y="536" width="60" height="20" rx="4" fill="#DBEAFE"/>
  <text x="352" y="551" font-size="9" font-weight="600" fill="#2563EB">后端开发</text>
