<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter,'Segoe UI','Microsoft YaHei',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#F0F4FF"/><stop offset="100%" stop-color="#E8EDFB"/></linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#1A56DB"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.08"/></filter>
    <filter id="shadow-sm"><feDropShadow dx="0" dy="1" stdDeviation="3" flood-opacity="0.06"/></filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="240" height="800" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="20" y="24" width="40" height="40" rx="10" fill="url(#primary)"/>
  <path d="M30 52 L36 52 L36 44 L42 44 L42 36 L48 36" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9"/>
  <circle cx="49" cy="31" r="3.5" fill="#fff"/>
  <text x="70" y="48" font-size="18" font-weight="700" fill="#141B2B">跃途</text>

  <text x="56" y="128" font-size="13" fill="#6B7280">🏠 工作台</text>
  <text x="56" y="162" font-size="13" fill="#6B7280">📄 简历中心</text>
  <rect x="16" y="178" width="208" height="44" rx="10" fill="#EBF0FF"/>
  <rect x="28" y="192" width="18" height="18" rx="4" fill="#1A56DB"/>
  <text x="56" y="206" font-size="14" font-weight="600" fill="#1A56DB">🎙️ 模拟面试</text>
  <text x="56" y="240" font-size="13" fill="#6B7280">💼 职位匹配</text>
  <text x="56" y="274" font-size="13" fill="#6B7280">📅 求职规划</text>

  <!-- Main Content -->
  <rect x="260" y="20" width="920" height="760" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- Chat Header -->
  <rect x="260" y="20" width="920" height="72" rx="16" fill="#FFFFFF"/>
  <line x1="260" y1="92" x2="1180" y2="92" stroke="#F3F4F6" stroke-width="1"/>
  <text x="296" y="55" font-size="18" font-weight="700" fill="#141B2B">AI 模拟面试</text>
  <text x="296" y="75" font-size="12" fill="#9CA3AF">技术面 · 后端开发 · 腾讯科技</text>

  <!-- Status indicator -->
  <circle cx="1080" cy="58" r="5" fill="#10B981"/>
  <text x="1092" y="62" font-size="11" fill="#10B981">面试进行中</text>

  <!-- Timer -->
  <rect x="980" y="42" width="80" height="28" rx="6" fill="#FEF3C7"/>
  <text x="994" y="61" font-size="12" font-weight="600" fill="#D9770B">⏱ 12:34</text>

  <!-- Chat Messages Area -->
  <rect x="280" y="100" width="880" height="560" fill="#FAFAFA" rx="8"/>

  <!-- AI Message 1 -->
  <g transform="translate(300,120)">
    <circle cx="16" cy="16" r="16" fill="url(#primary)"/>
    <text x="8" y="22" font-size="12" fill="#fff">AI</text>
    <rect x="42" y="0" width="580" height="70" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="58" y="24" font-size="13" fill="#141B2B">你好李跃，欢迎参加今天的模拟面试。我是你的 AI</text>
    <text x="58" y="44" font-size="13" fill="#141B2B">面试官。请先做一个简短的自我介绍吧。</text>
    <text x="58" y="62" font-size="10" fill="#9CA3AF">14:20</text>
  </g>

  <!-- User Message 1 -->
  <g transform="translate(300,210)">
    <rect x="260" y="0" width="580" height="90" rx="12" fill="#1A56DB"/>
    <text x="276" y="24" font-size="13" fill="#FFFFFF">面试官你好，我是李跃，华南理工大学计算机专业毕业，</text>
    <text x="276" y="44" font-size="13" fill="#FFFFFF">目前在某互联网公司担任后端开发工程师，有 3 年 Java</text>
    <text x="276" y="64" font-size="13" fill="#FFFFFF">开发经验。主要负责后端 API 开发和系统性能优化。</text>
    <text x="770" y="82" font-size="10" fill="rgba(255,255,255,0.7)">14:21</text>
    <circle cx="856" cy="16" r="16" fill="#E0E7FF"/>
    <text x="848" y="22" font-size="12" fill="#1A56DB" font-weight="600">李</text>
  </g>

  <!-- AI Message 2 -->
  <g transform="translate(300,320)">
    <circle cx="16" cy="16" r="16" fill="url(#primary)"/>
    <text x="8" y="22" font-size="12" fill="#fff">AI</text>
    <rect x="42" y="0" width="580" height="90" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
    <text x="58" y="24" font-size="13" fill="#141B2B">很好。你提到了系统性能优化，能具体说说你做了哪些</text>
    <text x="58" y="44" font-size="13" fill="#141B2B">优化工作吗？比如 QPS 从多少提升到多少？</text>
    <text x="58" y="68" font-size="11" fill="#7C3AED" font-weight="500">💡 提示：建议用 STAR 法则回答，量化你的成果</text>
    <text x="58" y="84" font-size="10" fill="#9CA3AF">14:22</text>
  </g>

  <!-- User Message 2 -->
  <g transform="translate(300,430)">
    <rect x="260" y="0" width="580" height="110" rx="12" fill="#1A56DB"/>
    <text x="276" y="24" font-size="13" fill="#FFFFFF">在最近的项目中，我发现订单查询接口响应时间过长。</text>
    <text x="276" y="44" font-size="13" fill="#FFFFFF">通过分析发现是数据库慢查询导致的。我做了以下优化：</text>
    <text x="276" y="64" font-size="13" fill="#FFFFFF">1) 添加联合索引 2) 引入 Redis 缓存热点数据 3) SQL</text>
    <text x="276" y="84" font-size="13" fill="#FFFFFF">查询优化。最终 QPS 从 2000 提升到 8000，P99 从 200ms</text>
    <text x="276" y="100" font-size="13" fill="#FFFFFF">降至 50ms。</text>
  </g>

  <!-- AI Feedback -->
  <g transform="translate(300,560)">
    <circle cx="16" cy="16" r="16" fill="url(#primary)"/>
    <text x="8" y="22" font-size="12" fill="#fff">AI</text>
    <rect x="42" y="0" width="660" height="80" rx="12" fill="#F0FDF4" stroke="#D1FAE5" stroke-width="1"/>
    <text x="58" y="24" font-size="13" fill="#141B2B">回答得很好！✅ STAR 结构完整，数据量化清晰。</text>
    <text x="58" y="44" font-size="13" fill="#141B2B">QPS 4 倍提升和 P99 降低 75% 是非常有说服力的成果。</text>
    <text x="58" y="64" font-size="11" fill="#16A34A" font-weight="500">评分：内容 9/10 · 逻辑 9/10 · 表达 8/10</text>
  </g>

  <!-- Input Area -->
  <rect x="280" y="680" width="880" height="80" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" filter="url(#shadow-sm)"/>
  <text x="306" y="725" font-size="14" fill="#D1D5DB">输入你的回答...</text>

  <!-- Send button -->
  <rect x="1060" y="694" width="80" height="36" rx="8" fill="url(#primary)"/>
  <text x="1078" y="718" font-size="13" font-weight="600" fill="#FFFFFF">发送 ➤</text>

  <!-- Voice button -->
  <rect x="1010" y="694" width="36" height="36" rx="8" fill="#F3F4F6"/>
  <text x="1020" y="718" font-size="16">🎤</text>

  <!-- User avatar -->
  <circle cx="1140" cy="58" r="16" fill="#E0E7FF"/>
  <text x="1132" y="63" font-size="12" fill="#1A56DB" font-weight="600">李</text>
</svg>
