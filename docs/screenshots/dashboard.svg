  <text x="56" y="162" font-size="13" fill="#6B7280">📄 简历中心</text>
  <text x="56" y="196" font-size="13" fill="#6B7280">🎙️ 模拟面试</text>
  <text x="56" y="230" font-size="13" fill="#6B7280">💼 职位匹配</text>
  <text x="56" y="264" font-size="13" fill="#6B7280">📅 求职规划</text>
