  <circle cx="1080" cy="58" r="12" fill="#1A56DB"/>
  <text x="1072" y="62" font-size="8" fill="#fff" font-weight="600">Leap</text>
  <text x="1098" y="62" font-size="9" fill="#9CA3AF">Flux</text>

