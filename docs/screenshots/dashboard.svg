    <rect x="198" y="30" width="68" height="36" rx="4" fill="#fff" stroke="#BFDBFE"/>
    <text x="204" y="48" font-size="9" fill="#141B2B">腾讯科技</text>
    <text x="204" y="60" font-size="8" fill="#9CA3AF">后端开发</text>

    <rect x="288" width="80" height="130" rx="6" fill="#F3F4F6"/>
    <text x="328" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#6B7280">已收藏</text>
    <rect x="294" y="30" width="68" height="36" rx="4" fill="#fff" stroke="#E5E7EB"/>
