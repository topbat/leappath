  <!-- Quote -->
  <rect x="746" y="540" width="410" height="220" rx="12" fill="url(#primary)" opacity="0.9"/>
  <text x="776" y="590" font-size="14" fill="rgba(255,255,255,0.7)">每日一句</text>
  <text x="776" y="625" font-size="18" font-weight="600" fill="#FFFFFF">"不止帮你找到工作，</text>
  <text x="776" y="655" font-size="18" font-weight="600" fill="#FFFFFF"> 更帮你找到「对」的工作。"</text>
  <text x="776" y="695" font-size="12" fill="rgba(255,255,255,0.6)">—— 跃途 LeapPath</text>
  <text x="776" y="720" font-size="11" fill="rgba(255,255,255,0.5)">距离目标入职日还有 70 天</text>

  <!-- User avatar -->
  <circle cx="1140" cy="58" r="16" fill="#E0E7FF"/>
  <text x="1132" y="63" font-size="12" fill="#1A56DB" font-weight="600">李</text>
