name: LeapPath CI/CD

on:
  # Push 触发
  push:
    branches: [main, develop, 'release/**']
    tags: ['v*']
  # Pull Request 触发
  pull_request:
    branches: [main]
  # 网页端手动触发 (workflow_dispatch)
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      run_tests:
        description: '是否运行测试'
        required: false
        default: true
        type: boolean
      deploy:
        description: '是否部署'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ==================== 后端检查 ====================
  backend-lint:
    name: 🔍 Backend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy

      - name: Run Ruff Linter
        run: ruff check . --output-format=github || true

      - name: Run Type Check
        run: mypy app/ --ignore-missing-imports --no-error-summary || true

  backend-test:
    name: 🧪 Backend Test
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx

      - name: Run Tests with Coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing || true
        env:
          LEAPPATH_DATABASE_URL: "sqlite:///test.db"
          LEAPPATH_DEMO_MODE: "false"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/htmlcov/
          retention-days: 30

  # ==================== 前端检查 ====================
  frontend-lint:
    name: 🔍 Frontend Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npm run lint --if-present || true

  frontend-build:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 30

  # ==================== 安全扫描 ====================
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run Safety Check
        run: |
          pip install safety
          safety check -r backend/requirements.txt --output text || true

      - name: Run Bandit Security Linter
        run: |
          pip install bandit
          bandit -r backend/app/ -ll -ii || true

      - name: Check for Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  # ==================== 集成测试 ====================
  integration-test:
    name: 🔗 Integration Test
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Backend
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
          pip install httpx

      - name: Start Backend Server
        working-directory: ./backend
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5
        env:
          LEAPPATH_DATABASE_URL: "sqlite:///integration_test.db"

      - name: Health Check
        run: |
          curl -f http://localhost:8000/api/health || exit 1
          echo "✅ Backend health check passed"

      - name: Test Auth API
        run: |
          # 测试登录
          RESPONSE=$(curl -s -X POST http://localhost:8000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"account":"demo@leappath.app","password":"leappath"}')
          echo "Login response: $RESPONSE"
          TOKEN=$(echo $RESPONSE | python -c "import sys,json; print(json.load(sys.stdin).get('token',''))")
          if [ -z "$TOKEN" ]; then
            echo "❌ Login failed"
            exit 1
          fi
          echo "✅ Auth API passed"

      - name: Test Dashboard API
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"account":"demo@leappath.app","password":"leappath"}' | \
            python -c "import sys,json; print(json.load(sys.stdin).get('token',''))")
          curl -f http://localhost:8000/api/dashboard \
            -H "Authorization: Bearer $TOKEN" || exit 1
          echo "✅ Dashboard API passed"

      - name: Test Resume API
        run: |
          TOKEN=$(curl -s -X POST http://localhost:8000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"account":"demo@leappath.app","password":"leappath"}' | \
            python -c "import sys,json; print(json.load(sys.stdin).get('token',''))")
          curl -f http://localhost:8000/api/resumes \
            -H "Authorization: Bearer $TOKEN" || exit 1
          echo "✅ Resume API passed"

  # ==================== Docker 构建 ====================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t leappath:${{ github.ref_name }} .
          echo "✅ Docker image built successfully"

  # ==================== 发布 Release ====================
  release:
    name: 🚀 Release
    runs-on: ubuntu-latest
    needs: [integration-test, security-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Frontend Build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

      - name: Generate Release Notes
        id: release_notes
        run: |
          # 提取 CHANGELOG 中最新版本的内容
          NOTES=$(sed -n '/^## \[1.0.1\]/,/^## \[/p' CHANGELOG.md | head -n -1)
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false
          files: |
            frontend/dist/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==================== 部署 ====================
  deploy:
    name: 🌐 Deploy
    runs-on: ubuntu-latest
    needs: release
    if: github.event.inputs.deploy == 'true'
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Environment
        run: |
          echo "🚀 Deploying to ${{ github.event.inputs.environment || 'staging' }}..."
          echo "Environment: ${{ github.event.inputs.environment || 'staging' }}"
          echo "Version: ${{ github.ref_name }}"
          # 实际部署命令根据目标平台配置
          # 例如: SSH deploy, Docker push, Kubernetes apply, etc.
          echo "✅ Deployment completed"
